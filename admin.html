<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Paleto Repairs</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    background: #f5f5f0;
    color: #222;
  }

  header {
    text-align: center;
    padding: 24px 20px;
    margin: -20px -20px 30px -20px;
    background: #2b3a2c;
    color: #fff;
  }

  header h1 {
    margin: 0;
    font-size: 1.6rem;
  }

  h2 {
    border-bottom: 2px solid #ccc;
    padding-bottom: 8px;
    margin-top: 40px;
  }

  /* --- Login gate --- */
  #login-box {
    max-width: 320px;
    margin: 60px auto;
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 24px;
    text-align: center;
  }
  #login-box input {
    width: 100%;
    padding: 10px;
    margin: 12px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  #login-error {
    color: #b4502c;
    font-size: 0.85rem;
    min-height: 18px;
  }

  #admin-panel { display: none; }

  /* --- Layout: form + live preview side by side --- */
  .editor-layout {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 20px;
    align-items: start;
  }
  @media (max-width: 720px) {
    .editor-layout { grid-template-columns: 1fr; }
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 18px;
  }
  .form-grid label {
    display: flex;
    flex-direction: column;
    font-size: 0.8rem;
    color: #555;
    gap: 4px;
  }
  .form-grid input,
  .form-grid textarea,
  .form-grid select {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.95rem;
    font-family: inherit;
    background: white;
  }
  .form-grid textarea {
    resize: vertical;
    min-height: 60px;
  }
  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    background: #fafaf7;
    border: 1px solid #eee;
    border-radius: 4px;
    padding: 10px 12px;
  }
  .checkbox-item {
    display: flex !important;
    flex-direction: row !important;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem !important;
    color: #333 !important;
  }
  .form-full { grid-column: 1 / -1; }
  .hint {
    font-size: 0.72rem;
    color: #888;
    margin-top: -2px;
  }

  button {
    cursor: pointer;
    border: none;
    border-radius: 4px;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: bold;
  }
  .btn-save { background: #2b3a2c; color: white; }
  .btn-cancel { background: #ccc; color: #333; margin-left: 8px; }
  .btn-delete { background: #b4502c; color: white; }
  .btn-edit { background: #ddd; color: #222; margin-right: 6px; }

  .status-msg { font-size: 0.85rem; margin-top: 10px; min-height: 18px; }

  /* --- Live preview card (mirrors public site styling) --- */
  .preview-wrap {
    position: sticky;
    top: 20px;
  }
  .preview-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #888;
    margin-bottom: 8px;
  }
  .car-card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .car-card .car-image {
    width: 100%;
    height: 170px;
    object-fit: cover;
    background: #ddd;
    display: block;
  }
  .car-card .car-image.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 0.85rem;
  }
  .car-card .car-body { padding: 14px 16px 16px; }
  .car-card h3 { margin: 0 0 6px 0; font-size: 1.1rem; }
  .badge {
    display: inline-block;
    background: #eee;
    color: #444;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    width: fit-content;
  }
  .price { font-size: 1.4rem; font-weight: bold; color: #b4502c; margin: 4px 0 10px 0; }
  .upgrades {
    font-size: 0.85rem; color: #555; margin-top: 10px;
    padding-top: 10px; border-top: 1px dashed #ddd;
  }
  .upgrades strong {
    display: block; font-size: 0.72rem; text-transform: uppercase;
    letter-spacing: 0.04em; color: #888; margin-bottom: 4px;
  }
  .upgrade-row { padding: 1px 0; }
  .upgrade-label { color: #888; }

  /* --- Existing cars list --- */
  .car-row {
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 12px 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .car-row img {
    width: 60px;
    height: 45px;
    object-fit: cover;
    border-radius: 4px;
    background: #ddd;
    flex-shrink: 0;
  }
  .car-row .info { flex: 1; min-width: 0; }
  .car-row .info h3 { margin: 0 0 3px 0; font-size: 1rem; }
  .car-row .info p { margin: 0; font-size: 0.82rem; color: #666; }
  .car-row .price-tag { font-weight: bold; color: #b4502c; margin-right: 4px; white-space: nowrap; }
  .empty-msg { color: #777; font-style: italic; }
</style>
</head>
<body>

<header>
  <h1>Paleto Repairs — Admin Panel</h1>
</header>

<div id="login-box">
  <p>Enter admin password to continue</p>
  <input type="password" id="password-input" placeholder="Password" />
  <button class="btn-save" onclick="checkPassword()">Log In</button>
  <div id="login-error"></div>
</div>

<div id="admin-panel">

  <h2 id="form-title">Add a Car</h2>

  <div class="editor-layout">
    <div class="form-grid">
      <label>Name
        <input type="text" id="car-name" placeholder="e.g. Bravado Buffalo" oninput="updatePreview()" />
      </label>
      <label>Price
        <input type="text" id="car-price" placeholder="e.g. $8,500" oninput="updatePreview()" />
      </label>
      <label>Condition
        <input type="text" id="car-condition" placeholder="e.g. Runs Good" oninput="updatePreview()" />
      </label>
      <label>Image URL
        <input type="text" id="car-image" placeholder="https://..." oninput="updatePreview()" />
      </label>
      <div class="hint form-full">Paste a link to an image (e.g. upload to imgur.com and paste the link here).</div>

      <label>Engine Tune
        <select id="car-engineTune" onchange="updatePreview()">
          <option>Stock</option>
          <option>EMS 2</option>
          <option>EMS 3</option>
          <option>EMS 4</option>
          <option>EMS 5 (Midnight)</option>
        </select>
      </label>
      <label>Transmission
        <select id="car-transmission" onchange="updatePreview()">
          <option>Stock</option>
          <option>Street</option>
          <option>Sports</option>
          <option>Race</option>
        </select>
      </label>
      <label>Turbo
        <select id="car-turbo" onchange="updatePreview()">
          <option>No</option>
          <option>Yes</option>
        </select>
      </label>
      <label>Suspension
        <select id="car-suspension" onchange="updatePreview()">
          <option>Stock</option>
          <option>Lowered</option>
          <option>Street</option>
          <option>Sport</option>
          <option>Competition</option>
        </select>
      </label>
      <label>Brakes
        <select id="car-brakes" onchange="updatePreview()">
          <option>Stock</option>
          <option>Street</option>
          <option>Sport</option>
          <option>Race</option>
        </select>
      </label>
      <label>Window Tint
        <select id="car-tint" onchange="updatePreview()">
          <option>None</option>
          <option>Pure Black</option>
          <option>Darksmoke</option>
          <option>Lightsmoke</option>
          <option>Limo</option>
          <option>Green</option>
        </select>
      </label>
      <label>Armor
        <select id="car-armor" onchange="updatePreview()">
          <option>Stock</option>
          <option>20%</option>
          <option>40%</option>
          <option>60%</option>
          <option>80%</option>
          <option>100%</option>
        </select>
      </label>

      <div class="form-full">
        <label style="margin-bottom:6px;">System (check any that apply)</label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="checkbox" class="system-check" value="Alert System" onchange="updatePreview()"> Alert System</label>
          <label class="checkbox-item"><input type="checkbox" class="system-check" value="Heated Seat" onchange="updatePreview()"> Heated Seat</label>
          <label class="checkbox-item"><input type="checkbox" class="system-check" value="Rainbow Neon" onchange="updatePreview()"> Rainbow Neon</label>
          <label class="checkbox-item"><input type="checkbox" class="system-check" value="Security Locks" onchange="updatePreview()"> Security Locks</label>
          <label class="checkbox-item"><input type="checkbox" class="system-check" value="Dash Cam" onchange="updatePreview()"> Dash Cam</label>
        </div>
      </div>

      <div class="hint form-full">Anything left as "Stock" / "None" / "No" won't show up on the card — only real upgrades display.</div>
      <div class="form-full">
        <button class="btn-save" onclick="saveCar()">Save Car</button>
        <button class="btn-cancel" id="cancel-btn" style="display:none" onclick="resetForm()">Cancel Edit</button>
        <div class="status-msg" id="status-msg"></div>
      </div>
    </div>

    <div class="preview-wrap">
      <div class="preview-label">Live Preview</div>
      <div id="preview-card"></div>
    </div>
  </div>

  <h2>Current Inventory</h2>
  <div id="car-list">
    <p class="empty-msg">Loading...</p>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqmvzexaHohfggxW03ImbBFiomA49f3y0",
    authDomain: "used-cars-rp.firebaseapp.com",
    databaseURL: "https://used-cars-rp-default-rtdb.firebaseio.com",
    projectId: "used-cars-rp",
    storageBucket: "used-cars-rp.firebasestorage.app",
    messagingSenderId: "84719558182",
    appId: "1:84719558182:web:a4f01302c0a42fcd0c90e7",
    measurementId: "G-Q6F83G131G"
  };

  // ⚠️ Simple client-side password. Not real security — just keeps casual visitors out.
  const ADMIN_PASSWORD = "changeme";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const carsRef = ref(db, "cars");

  let editingKey = null;

  window.checkPassword = function () {
    const input = document.getElementById("password-input").value;
    if (input === ADMIN_PASSWORD) {
      document.getElementById("login-box").style.display = "none";
      document.getElementById("admin-panel").style.display = "block";
      updatePreview();
    } else {
      document.getElementById("login-error").textContent = "Wrong password.";
    }
  };

  function getFormValues() {
    const checkedSystems = Array.from(document.querySelectorAll(".system-check:checked")).map(el => el.value);
    return {
      name: document.getElementById("car-name").value.trim(),
      price: document.getElementById("car-price").value.trim(),
      condition: document.getElementById("car-condition").value.trim(),
      image: document.getElementById("car-image").value.trim(),
      engineTune: document.getElementById("car-engineTune").value,
      transmission: document.getElementById("car-transmission").value,
      turbo: document.getElementById("car-turbo").value,
      suspension: document.getElementById("car-suspension").value,
      brakes: document.getElementById("car-brakes").value,
      tint: document.getElementById("car-tint").value,
      armor: document.getElementById("car-armor").value,
      system: checkedSystems,
    };
  }

  function buildCardHtml(car) {
    const imageHtml = car.image
      ? `<img class="car-image" src="${escapeHtml(car.image)}" alt="${escapeHtml(car.name || 'Car photo')}" onerror="this.outerHTML='<div class=&quot;car-image placeholder&quot;>Image failed to load</div>'">`
      : `<div class="car-image placeholder">No image</div>`;

    const upgradeFields = [
      ["Engine Tune", car.engineTune, "Stock"],
      ["Transmission", car.transmission, "Stock"],
      ["Turbo", car.turbo, "No"],
      ["Suspension", car.suspension, "Stock"],
      ["Brakes", car.brakes, "Stock"],
      ["Window Tint", car.tint, "None"],
      ["Armor", car.armor, "Stock"],
    ].filter(([, value, defaultValue]) => value && value !== defaultValue);

    const systemList = Array.isArray(car.system) ? car.system : [];

    const upgradeRowsHtml = upgradeFields.map(([label, value]) =>
      `<div class="upgrade-row"><span class="upgrade-label">${escapeHtml(label)}:</span> ${escapeHtml(value)}</div>`
    ).join("");

    const systemRowHtml = systemList.length
      ? `<div class="upgrade-row"><span class="upgrade-label">System:</span> ${escapeHtml(systemList.join(", "))}</div>`
      : "";

    const upgradesHtml = (upgradeFields.length || systemList.length)
      ? `<div class="upgrades"><strong>Upgrades</strong>${upgradeRowsHtml}${systemRowHtml}</div>`
      : "";

    return `
      <div class="car-card">
        ${imageHtml}
        <div class="car-body">
          <h3>${escapeHtml(car.name || "Untitled Car")}</h3>
          ${car.condition ? `<span class="badge">${escapeHtml(car.condition)}</span>` : ""}
          <div class="price">${escapeHtml(car.price || "")}</div>
          ${upgradesHtml}
        </div>
      </div>
    `;
  }

  window.updatePreview = function () {
    const values = getFormValues();
    document.getElementById("preview-card").innerHTML = buildCardHtml(values);
  };

  window.saveCar = function () {
    const values = getFormValues();
    const statusEl = document.getElementById("status-msg");

    if (!values.name || !values.price) {
      statusEl.textContent = "Name and price are required.";
      statusEl.style.color = "#b4502c";
      return;
    }

    const savePromise = editingKey
      ? set(ref(db, "cars/" + editingKey), values)
      : set(push(carsRef), values);

    savePromise.then(() => {
      statusEl.textContent = "Saved.";
      statusEl.style.color = "green";
      resetForm();
    }).catch((err) => {
      statusEl.textContent = "Error saving. Check Firebase config.";
      statusEl.style.color = "#b4502c";
      console.error(err);
    });
  };

  window.editCar = function (key, car) {
    editingKey = key;
    document.getElementById("form-title").textContent = "Edit Car";
    document.getElementById("car-name").value = car.name || "";
    document.getElementById("car-price").value = car.price || "";
    document.getElementById("car-condition").value = car.condition || "";
    document.getElementById("car-image").value = car.image || "";
    document.getElementById("car-engineTune").value = car.engineTune || "Stock";
    document.getElementById("car-transmission").value = car.transmission || "Stock";
    document.getElementById("car-turbo").value = car.turbo || "No";
    document.getElementById("car-suspension").value = car.suspension || "Stock";
    document.getElementById("car-brakes").value = car.brakes || "Stock";
    document.getElementById("car-tint").value = car.tint || "None";
    document.getElementById("car-armor").value = car.armor || "Stock";
    const systemList = Array.isArray(car.system) ? car.system : [];
    document.querySelectorAll(".system-check").forEach(el => {
      el.checked = systemList.includes(el.value);
    });
    document.getElementById("cancel-btn").style.display = "inline-block";
    updatePreview();
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  window.deleteCar = function (key) {
    if (confirm("Delete this car?")) {
      remove(ref(db, "cars/" + key));
    }
  };

  window.resetForm = function () {
    editingKey = null;
    document.getElementById("form-title").textContent = "Add a Car";
    document.getElementById("car-name").value = "";
    document.getElementById("car-price").value = "";
    document.getElementById("car-condition").value = "";
    document.getElementById("car-image").value = "";
    document.getElementById("car-engineTune").value = "Stock";
    document.getElementById("car-transmission").value = "Stock";
    document.getElementById("car-turbo").value = "No";
    document.getElementById("car-suspension").value = "Stock";
    document.getElementById("car-brakes").value = "Stock";
    document.getElementById("car-tint").value = "None";
    document.getElementById("car-armor").value = "Stock";
    document.querySelectorAll(".system-check").forEach(el => { el.checked = false; });
    document.getElementById("cancel-btn").style.display = "none";
    document.getElementById("status-msg").textContent = "";
    updatePreview();
  };

  const listEl = document.getElementById("car-list");

  onValue(carsRef, (snapshot) => {
    const data = snapshot.val();

    if (!data) {
      listEl.innerHTML = '<p class="empty-msg">No cars yet. Add one above.</p>';
      return;
    }

    listEl.innerHTML = Object.entries(data).map(([key, car]) => `
      <div class="car-row">
        ${car.image ? `<img src="${escapeHtml(car.image)}" alt="" onerror="this.style.display='none'">` : ""}
        <div class="info">
          <h3>${escapeHtml(car.name || "")}</h3>
          <p>${escapeHtml(car.condition || "")}</p>
        </div>
        <span class="price-tag">${escapeHtml(car.price || "")}</span>
        <button class="btn-edit" data-key="${key}">Edit</button>
        <button class="btn-delete" data-key="${key}">Delete</button>
      </div>
    `).join("");

    listEl.querySelectorAll(".btn-edit").forEach(btn => {
      btn.addEventListener("click", () => window.editCar(btn.dataset.key, data[btn.dataset.key]));
    });
    listEl.querySelectorAll(".btn-delete").forEach(btn => {
      btn.addEventListener("click", () => window.deleteCar(btn.dataset.key));
    });
  }, (error) => {
    listEl.innerHTML = '<p class="empty-msg">Could not load inventory. Check the Firebase config.</p>';
    console.error(error);
  });

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
