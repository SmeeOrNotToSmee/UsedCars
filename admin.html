<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Paleto Repairs</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
    background: #f5f5f0;
    color: #222;
  }

  header {
    text-align: center;
    padding: 24px 20px;
    margin: -20px -20px 30px -20px;
    background: #2b3a2c;
    color: #fff;
  }

  header h1 {
    margin: 0;
    font-size: 1.6rem;
  }

  h2 {
    border-bottom: 2px solid #ccc;
    padding-bottom: 8px;
    margin-top: 40px;
  }

  /* --- Login gate --- */
  #login-box {
    max-width: 320px;
    margin: 60px auto;
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 24px;
    text-align: center;
  }
  #login-box input {
    width: 100%;
    padding: 10px;
    margin: 12px 0;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  #login-error {
    color: #b4502c;
    font-size: 0.85rem;
    min-height: 18px;
  }

  #admin-panel { display: none; }

  /* --- Form --- */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 18px;
  }
  .form-grid label {
    display: flex;
    flex-direction: column;
    font-size: 0.8rem;
    color: #555;
    gap: 4px;
  }
  .form-grid input {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.95rem;
  }
  .form-full { grid-column: 1 / -1; }

  button {
    cursor: pointer;
    border: none;
    border-radius: 4px;
    padding: 10px 18px;
    font-size: 0.9rem;
    font-weight: bold;
  }
  .btn-save {
    background: #2b3a2c;
    color: white;
  }
  .btn-cancel {
    background: #ccc;
    color: #333;
    margin-left: 8px;
  }
  .btn-delete {
    background: #b4502c;
    color: white;
  }
  .btn-edit {
    background: #ddd;
    color: #222;
    margin-right: 6px;
  }

  /* --- Existing cars list --- */
  .car-row {
    background: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  .car-row .info h3 { margin: 0 0 3px 0; font-size: 1rem; }
  .car-row .info p { margin: 0; font-size: 0.82rem; color: #666; }
  .car-row .price { font-weight: bold; color: #b4502c; margin-right: 12px; }
  .empty-msg { color: #777; font-style: italic; }

  .status-msg {
    font-size: 0.85rem;
    margin-top: 10px;
    min-height: 18px;
  }
</style>
</head>
<body>

<header>
  <h1>Paleto Repairs — Admin Panel</h1>
</header>

<div id="login-box">
  <p>Enter admin password to continue</p>
  <input type="password" id="password-input" placeholder="Password" />
  <button class="btn-save" onclick="checkPassword()">Log In</button>
  <div id="login-error"></div>
</div>

<div id="admin-panel">

  <h2 id="form-title">Add a Car</h2>
  <div class="form-grid">
    <label>Name
      <input type="text" id="car-name" placeholder="e.g. Bravado Buffalo" />
    </label>
    <label>Price
      <input type="text" id="car-price" placeholder="e.g. $8,500" />
    </label>
    <label>Mileage
      <input type="text" id="car-mileage" placeholder="e.g. 62,400 miles" />
    </label>
    <label>Condition
      <input type="text" id="car-condition" placeholder="e.g. Runs Good" />
    </label>
    <div class="form-full">
      <button class="btn-save" onclick="saveCar()">Save Car</button>
      <button class="btn-cancel" id="cancel-btn" style="display:none" onclick="resetForm()">Cancel Edit</button>
      <div class="status-msg" id="status-msg"></div>
    </div>
  </div>

  <h2>Current Inventory</h2>
  <div id="car-list">
    <p class="empty-msg">Loading...</p>
  </div>

</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, push, set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqmvzexaHohfggxW03ImbBFiomA49f3y0",
    authDomain: "used-cars-rp.firebaseapp.com",
    databaseURL: "https://used-cars-rp-default-rtdb.firebaseio.com",
    projectId: "used-cars-rp",
    storageBucket: "used-cars-rp.firebasestorage.app",
    messagingSenderId: "84719558182",
    appId: "1:84719558182:web:a4f01302c0a42fcd0c90e7",
    measurementId: "G-Q6F83G131G"
  };

  // ⚠️ Simple client-side password. Not real security — just keeps casual visitors out.
  const ADMIN_PASSWORD = "changeme";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const carsRef = ref(db, "cars");

  let editingKey = null;

  window.checkPassword = function () {
    const input = document.getElementById("password-input").value;
    if (input === ADMIN_PASSWORD) {
      document.getElementById("login-box").style.display = "none";
      document.getElementById("admin-panel").style.display = "block";
    } else {
      document.getElementById("login-error").textContent = "Wrong password.";
    }
  };

  window.saveCar = function () {
    const name = document.getElementById("car-name").value.trim();
    const price = document.getElementById("car-price").value.trim();
    const mileage = document.getElementById("car-mileage").value.trim();
    const condition = document.getElementById("car-condition").value.trim();
    const statusEl = document.getElementById("status-msg");

    if (!name || !price) {
      statusEl.textContent = "Name and price are required.";
      statusEl.style.color = "#b4502c";
      return;
    }

    const carData = { name, price, mileage, condition };

    const savePromise = editingKey
      ? set(ref(db, "cars/" + editingKey), carData)
      : set(push(carsRef), carData);

    savePromise.then(() => {
      statusEl.textContent = "Saved.";
      statusEl.style.color = "green";
      resetForm();
    }).catch((err) => {
      statusEl.textContent = "Error saving. Check Firebase config.";
      statusEl.style.color = "#b4502c";
      console.error(err);
    });
  };

  window.editCar = function (key, car) {
    editingKey = key;
    document.getElementById("form-title").textContent = "Edit Car";
    document.getElementById("car-name").value = car.name || "";
    document.getElementById("car-price").value = car.price || "";
    document.getElementById("car-mileage").value = car.mileage || "";
    document.getElementById("car-condition").value = car.condition || "";
    document.getElementById("cancel-btn").style.display = "inline-block";
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  window.deleteCar = function (key) {
    if (confirm("Delete this car?")) {
      remove(ref(db, "cars/" + key));
    }
  };

  window.resetForm = function () {
    editingKey = null;
    document.getElementById("form-title").textContent = "Add a Car";
    document.getElementById("car-name").value = "";
    document.getElementById("car-price").value = "";
    document.getElementById("car-mileage").value = "";
    document.getElementById("car-condition").value = "";
    document.getElementById("cancel-btn").style.display = "none";
    document.getElementById("status-msg").textContent = "";
  };

  const listEl = document.getElementById("car-list");

  onValue(carsRef, (snapshot) => {
    const data = snapshot.val();

    if (!data) {
      listEl.innerHTML = '<p class="empty-msg">No cars yet. Add one above.</p>';
      return;
    }

    listEl.innerHTML = Object.entries(data).map(([key, car]) => `
      <div class="car-row">
        <div class="info">
          <h3>${escapeHtml(car.name || "")}</h3>
          <p>${escapeHtml(car.mileage || "")} &middot; ${escapeHtml(car.condition || "")}</p>
        </div>
        <div>
          <span class="price">${escapeHtml(car.price || "")}</span>
          <button class="btn-edit" data-key="${key}">Edit</button>
          <button class="btn-delete" data-key="${key}">Delete</button>
        </div>
      </div>
    `).join("");

    listEl.querySelectorAll(".btn-edit").forEach(btn => {
      btn.addEventListener("click", () => window.editCar(btn.dataset.key, data[btn.dataset.key]));
    });
    listEl.querySelectorAll(".btn-delete").forEach(btn => {
      btn.addEventListener("click", () => window.deleteCar(btn.dataset.key));
    });
  }, (error) => {
    listEl.innerHTML = '<p class="empty-msg">Could not load inventory. Check the Firebase config.</p>';
    console.error(error);
  });

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>

</body>
</html>
