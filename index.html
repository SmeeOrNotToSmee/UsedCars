<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paleto Repairs Used Cars</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
    background: #f5f5f0;
    color: #222;
  }

  header {
    text-align: center;
    padding: 30px 20px;
    margin: -20px -20px 30px -20px;
    background: #2b3a2c;
    color: #fff;
  }

  header h1 {
    margin: 0;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }

  header p {
    color: #cfc9b0;
    margin-top: 6px;
  }

  h2 {
    border-bottom: 2px solid #ccc;
    padding-bottom: 8px;
    margin-top: 40px;
  }

  .car-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 260px);
    justify-content: center;
    gap: 20px;
  }

  .car-card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    width: 260px;
  }

  .car-card .car-image {
    width: 100%;
    height: 170px;
    object-fit: contain;
    background: #ddd;
    display: block;
  }

  .car-card .car-image.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 0.85rem;
  }

  .car-card .car-body {
    padding: 14px 16px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .car-card h3 {
    margin: 0 0 6px 0;
    font-size: 1.1rem;
  }

  .badge {
    display: inline-block;
    background: #eee;
    color: #444;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    width: fit-content;
  }

  .price {
    font-size: 1.4rem;
    font-weight: bold;
    color: #b4502c;
    margin: 4px 0 10px 0;
  }

  .upgrades {
    font-size: 0.85rem;
    color: #555;
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px dashed #ddd;
  }

  .upgrades strong {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #888;
    margin-bottom: 4px;
  }

  .upgrade-row { padding: 1px 0; }
  .upgrade-label { color: #888; }

  footer {
    text-align: center;
    color: #888;
    font-size: 0.8rem;
    margin-top: 40px;
    padding: 20px 0;
  }

  .empty-msg, .loading-msg {
    color: #777;
    font-style: italic;
    padding: 10px 0;
  }

  /* --- Sell Us Your Car form --- */
  .sell-form {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 20px;
  }

  .sell-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .sell-grid label {
    display: flex;
    flex-direction: column;
    font-size: 0.8rem;
    color: #555;
    gap: 4px;
  }

  .sell-grid input,
  .sell-grid select,
  .sell-grid textarea {
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 0.95rem;
    font-family: inherit;
    background: white;
  }

  .sell-grid textarea {
    resize: vertical;
    min-height: 60px;
  }

  .sell-full {
    grid-column: 1 / -1;
  }

  @media (max-width: 600px) {
    .sell-grid { grid-template-columns: 1fr; }
  }

  .dollar-input {
    display: flex;
    align-items: center;
    border: 1px solid #ccc;
    border-radius: 4px;
    overflow: hidden;
  }
  .dollar-input span {
    background: #eee;
    padding: 8px 10px;
    color: #555;
    font-weight: bold;
  }
  .dollar-input input {
    border: none;
    flex: 1;
    padding: 8px;
    font-size: 0.95rem;
  }

  .checkbox-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 16px;
    background: #fafaf7;
    border: 1px solid #eee;
    border-radius: 4px;
    padding: 10px 12px;
    margin-top: 4px;
  }
  .checkbox-item {
    display: flex !important;
    flex-direction: row !important;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem !important;
    color: #333 !important;
  }

  .midnight-note {
    font-size: 0.78rem;
    color: #b4502c;
    margin-top: 6px;
    font-style: italic;
  }

  .payout-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #2b3a2c;
    color: #fff;
    padding: 14px 18px;
    border-radius: 6px;
  }
  .payout-label {
    font-size: 0.85rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: #cfc9b0;
  }
  .payout-amount {
    font-size: 1.5rem;
    font-weight: bold;
    color: #ffd27a;
  }

  .btn-submit {
    background: #2b3a2c;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 10px 22px;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
  }

  .sell-status {
    font-size: 0.85rem;
    margin-top: 10px;
    min-height: 18px;
  }
</style>
</head>
<body>

<header>
  <h1>Paleto Repairs Used Cars</h1>
  <p>Blaine County's used car lot</p>
</header>

<h2>Cars For Sale</h2>
<div id="car-list" class="car-grid">
  <p class="loading-msg">Loading inventory...</p>
</div>

<h2>Sell Us Your Car</h2>
<div class="sell-form">
  <div class="sell-grid">
    <label>Name
      <input type="text" id="sell-name" placeholder="Your name" />
    </label>
    <label>CID
      <input type="text" id="sell-cid" placeholder="Your CID" />
    </label>
    <label>Phone Number
      <input type="text" id="sell-phone" placeholder="Phone number" />
    </label>
    <label>Car Value As New
      <div class="dollar-input">
        <span>$</span>
        <input type="number" id="sell-value" placeholder="0" min="0" />
      </div>
    </label>

    <label>Engine Tune
      <select id="sell-engineTune" onchange="updatePayoutEstimate()">
        <option>Stock</option>
        <option>EMS 2</option>
        <option>EMS 3</option>
        <option>EMS 4</option>
        <option>EMS 5 (Midnight)</option>
      </select>
    </label>
    <label>Transmission
      <select id="sell-transmission" onchange="updatePayoutEstimate()">
        <option>Stock</option>
        <option>Street</option>
        <option>Sports</option>
        <option>Race</option>
      </select>
    </label>
    <label>Turbo
      <select id="sell-turbo" onchange="updatePayoutEstimate()">
        <option>No</option>
        <option>Yes</option>
      </select>
    </label>
    <label>Suspension
      <select id="sell-suspension" onchange="updatePayoutEstimate()">
        <option>Stock</option>
        <option>Lowered</option>
        <option>Street</option>
        <option>Sport</option>
        <option>Competition</option>
      </select>
    </label>
    <label>Brakes
      <select id="sell-brakes" onchange="updatePayoutEstimate()">
        <option>Stock</option>
        <option>Street</option>
        <option>Sport</option>
        <option>Race</option>
      </select>
    </label>
    <label>Window Tint
      <select id="sell-tint" onchange="updatePayoutEstimate()">
        <option>None</option>
        <option>Pure Black</option>
        <option>Darksmoke</option>
        <option>Lightsmoke</option>
        <option>Limo</option>
        <option>Green</option>
      </select>
    </label>
    <label>Armor
      <select id="sell-armor" onchange="updatePayoutEstimate()">
        <option>Stock</option>
        <option>20%</option>
        <option>40%</option>
        <option>60%</option>
        <option>80%</option>
        <option>100%</option>
      </select>
    </label>

    <div class="sell-full">
      <label>System (check any that apply)</label>
      <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" class="sell-system-check" value="Alert System" onchange="updatePayoutEstimate()"> Alert System</label>
        <label class="checkbox-item"><input type="checkbox" class="sell-system-check" value="Heated Seat" onchange="updatePayoutEstimate()"> Heated Seat</label>
        <label class="checkbox-item"><input type="checkbox" class="sell-system-check" value="Rainbow Neon" onchange="updatePayoutEstimate()"> Rainbow Neon</label>
        <label class="checkbox-item"><input type="checkbox" class="sell-system-check" value="Security Locks" onchange="updatePayoutEstimate()"> Security Locks</label>
        <label class="checkbox-item"><input type="checkbox" class="sell-system-check" value="Dash Cam" onchange="updatePayoutEstimate()"> Dash Cam</label>
      </div>
    </div>

    <div class="sell-full">
      <label>Midnight Upgrades (list any)
        <textarea id="sell-midnight" placeholder="List any midnight upgrades here"></textarea>
      </label>
      <p class="midnight-note">At this time we may not buy midnight upgraded cars (EMS 5 excluded).</p>
    </div>

    <div class="sell-full payout-box">
      <span class="payout-label">Estimated Upgrade Payout (50%)</span>
      <span class="payout-amount" id="payout-amount">$0</span>
    </div>

    <div class="sell-full">
      <button class="btn-submit" onclick="submitSellRequest()">Submit</button>
      <div class="sell-status" id="sell-status"></div>
    </div>
  </div>
</div>

<footer>
  Paleto Repairs Used Cars — fictional dealership for roleplay purposes only.
</footer>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqmvzexaHohfggxW03ImbBFiomA49f3y0",
    authDomain: "used-cars-rp.firebaseapp.com",
    databaseURL: "https://used-cars-rp-default-rtdb.firebaseio.com",
    projectId: "used-cars-rp",
    storageBucket: "used-cars-rp.firebasestorage.app",
    messagingSenderId: "84719558182",
    appId: "1:84719558182:web:a4f01302c0a42fcd0c90e7",
    measurementId: "G-Q6F83G131G"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const carsRef = ref(db, "cars");
  const sellRequestsRef = ref(db, "sellRequests");

  const DISCORD_WEBHOOK_URL = "https://discord.com/api/webhooks/1522688935334117578/Imw4AQX6vy4jRhL2a90IgQOqIwtZZOfay3lhLgkF_R90CoJfhri3Eiu4Lmg1LF25kRiP";

  // Full prices for each upgrade. Payout to the seller is 50% of these.
  const UPGRADE_PRICES = {
    engineTune: { "EMS 2": 2500, "EMS 3": 3500, "EMS 4": 5000, "EMS 5 (Midnight)": 12000 },
    transmission: { "Street": 1000, "Sports": 1250, "Race": 1500 },
    turbo: { "Yes": 6000 },
    suspension: { "Lowered": 1000, "Street": 2000, "Sport": 3500, "Competition": 4000 },
    brakes: { "Street": 2000, "Sports": 3000, "Race": 4000 },
    tint: { "Pure Black": 300, "Darksmoke": 300, "Lightsmoke": 300, "Limo": 250, "Green": 250 },
    armor: { "20%": 1000, "40%": 3000, "60%": 4000, "80%": 5000, "100%": 7500 },
    system: { "Alert System": 4000, "Heated Seat": 2500, "Rainbow Neon": 6500, "Security Locks": 5500, "Dash Cam": 1200 },
  };

  function calculateUpgradeTotal(values) {
    let total = 0;
    total += UPGRADE_PRICES.engineTune[values.engineTune] || 0;
    total += UPGRADE_PRICES.transmission[values.transmission] || 0;
    total += UPGRADE_PRICES.turbo[values.turbo] || 0;
    total += UPGRADE_PRICES.suspension[values.suspension] || 0;
    total += UPGRADE_PRICES.brakes[values.brakes] || 0;
    total += UPGRADE_PRICES.tint[values.tint] || 0;
    total += UPGRADE_PRICES.armor[values.armor] || 0;
    (values.system || []).forEach(sys => {
      total += UPGRADE_PRICES.system[sys] || 0;
    });
    return total;
  }

  window.updatePayoutEstimate = function () {
    const values = getSellFormValues();
    const total = calculateUpgradeTotal(values);
    const payout = Math.round(total * 0.5);
    document.getElementById("payout-amount").textContent = `$${payout.toLocaleString()}`;
  };

  function getSellFormValues() {
    const checkedSystems = Array.from(document.querySelectorAll(".sell-system-check:checked")).map(el => el.value);
    return {
      engineTune: document.getElementById("sell-engineTune").value,
      transmission: document.getElementById("sell-transmission").value,
      turbo: document.getElementById("sell-turbo").value,
      suspension: document.getElementById("sell-suspension").value,
      brakes: document.getElementById("sell-brakes").value,
      tint: document.getElementById("sell-tint").value,
      armor: document.getElementById("sell-armor").value,
      system: checkedSystems,
    };
  }

  function sendDiscordNotification(data) {
    const specFields = [
      ["Engine Tune", data.engineTune, "Stock"],
      ["Transmission", data.transmission, "Stock"],
      ["Turbo", data.turbo, "No"],
      ["Suspension", data.suspension, "Stock"],
      ["Brakes", data.brakes, "Stock"],
      ["Window Tint", data.tint, "None"],
      ["Armor", data.armor, "Stock"],
    ].filter(([, value, def]) => value && value !== def)
      .map(([label, value]) => ({ name: label, value: value, inline: true }));

    const fields = [
      { name: "Name", value: data.name || "—", inline: true },
      { name: "CID", value: data.cid || "—", inline: true },
      { name: "Phone", value: data.phone || "—", inline: true },
      { name: "Value As New", value: data.value ? `$${data.value}` : "—", inline: true },
      ...specFields,
    ];

    if (data.system && data.system.length) {
      fields.push({ name: "System", value: data.system.join(", "), inline: true });
    }
    if (data.midnight) {
      fields.push({ name: "Midnight Upgrades", value: data.midnight, inline: false });
    }
    fields.push({ name: "Estimated Upgrade Payout (50%)", value: `$${(data.upgradePayout || 0).toLocaleString()}`, inline: false });

    const payload = {
      embeds: [{
        title: "New Sell Request",
        color: 0xb4502c,
        fields,
        timestamp: data.submittedAt,
      }],
    };

    fetch(DISCORD_WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    }).catch((err) => console.error("Discord notification failed:", err));
  }

  window.submitSellRequest = function () {
    const statusEl = document.getElementById("sell-status");
    const name = document.getElementById("sell-name").value.trim();
    const cid = document.getElementById("sell-cid").value.trim();
    const phone = document.getElementById("sell-phone").value.trim();
    const value = document.getElementById("sell-value").value.trim();

    if (!name || !phone) {
      statusEl.textContent = "Name and phone number are required.";
      statusEl.style.color = "#b4502c";
      return;
    }

    const checkedSystems = Array.from(document.querySelectorAll(".sell-system-check:checked")).map(el => el.value);

    const data = {
      name,
      cid,
      phone,
      value,
      engineTune: document.getElementById("sell-engineTune").value,
      transmission: document.getElementById("sell-transmission").value,
      turbo: document.getElementById("sell-turbo").value,
      suspension: document.getElementById("sell-suspension").value,
      brakes: document.getElementById("sell-brakes").value,
      tint: document.getElementById("sell-tint").value,
      armor: document.getElementById("sell-armor").value,
      system: checkedSystems,
      midnight: document.getElementById("sell-midnight").value.trim(),
      upgradePayout: Math.round(calculateUpgradeTotal({
        engineTune: document.getElementById("sell-engineTune").value,
        transmission: document.getElementById("sell-transmission").value,
        turbo: document.getElementById("sell-turbo").value,
        suspension: document.getElementById("sell-suspension").value,
        brakes: document.getElementById("sell-brakes").value,
        tint: document.getElementById("sell-tint").value,
        armor: document.getElementById("sell-armor").value,
        system: checkedSystems,
      }) * 0.5),
      submittedAt: new Date().toISOString(),
    };

    set(push(sellRequestsRef), data).then(() => {
      statusEl.textContent = "Submitted! We'll be in touch.";
      statusEl.style.color = "green";
      sendDiscordNotification(data);
      document.querySelectorAll(".sell-grid input, .sell-grid select, .sell-grid textarea").forEach(el => {
        if (el.type === "checkbox") el.checked = false;
        else if (el.tagName === "SELECT") el.selectedIndex = 0;
        else el.value = "";
      });
      updatePayoutEstimate();
    }).catch((err) => {
      statusEl.textContent = "Something went wrong submitting. Try again.";
      statusEl.style.color = "#b4502c";
      console.error(err);
    });
  };

  const listEl = document.getElementById("car-list");

  onValue(carsRef, (snapshot) => {
    const data = snapshot.val();

    if (!data) {
      listEl.innerHTML = '<p class="empty-msg">No cars on the lot right now. Check back soon.</p>';
      return;
    }

    listEl.innerHTML = Object.values(data).map(car => buildCardHtml(car)).join("");
  }, (error) => {
    listEl.innerHTML = '<p class="empty-msg">Could not load inventory. Check the Firebase config.</p>';
    console.error(error);
  });

  function buildCardHtml(car) {
    const imageHtml = car.image
      ? `<img class="car-image" src="${escapeHtml(car.image)}" alt="${escapeHtml(car.name || 'Car photo')}" onerror="this.outerHTML='<div class=&quot;car-image placeholder&quot;>No image</div>'">`
      : `<div class="car-image placeholder">No image</div>`;

    const upgradeFields = [
      ["Engine Tune", car.engineTune, "Stock"],
      ["Transmission", car.transmission, "Stock"],
      ["Turbo", car.turbo, "No"],
      ["Suspension", car.suspension, "Stock"],
      ["Brakes", car.brakes, "Stock"],
      ["Window Tint", car.tint, "None"],
      ["Armor", car.armor, "Stock"],
    ].filter(([, value, defaultValue]) => value && value !== defaultValue);

    const systemList = Array.isArray(car.system) ? car.system : [];

    const upgradeRowsHtml = upgradeFields.map(([label, value]) =>
      `<div class="upgrade-row"><span class="upgrade-label">${escapeHtml(label)}:</span> ${escapeHtml(value)}</div>`
    ).join("");

    const systemRowHtml = systemList.length
      ? `<div class="upgrade-row"><span class="upgrade-label">System:</span> ${escapeHtml(systemList.join(", "))}</div>`
      : "";

    const upgradesHtml = (upgradeFields.length || systemList.length)
      ? `<div class="upgrades"><strong>Upgrades</strong>${upgradeRowsHtml}${systemRowHtml}</div>`
      : "";

    return `
      <div class="car-card">
        ${imageHtml}
        <div class="car-body">
          <h3>${escapeHtml(car.name || "")}</h3>
          ${car.condition ? `<span class="badge">${escapeHtml(car.condition)}</span>` : ""}
          <div class="price">${escapeHtml(car.price || "")}</div>
          ${upgradesHtml}
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // exposed for potential reuse
  window.buildCardHtml = buildCardHtml;
</script>

</body>
</html>
