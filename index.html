<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paleto Repairs Used Cars</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
    background: #f5f5f0;
    color: #222;
  }

  header {
    text-align: center;
    padding: 30px 20px;
    margin: -20px -20px 30px -20px;
    background: #2b3a2c;
    color: #fff;
  }

  header h1 {
    margin: 0;
    font-size: 2.2rem;
    letter-spacing: 1px;
  }

  header p {
    color: #cfc9b0;
    margin-top: 6px;
  }

  h2 {
    border-bottom: 2px solid #ccc;
    padding-bottom: 8px;
    margin-top: 40px;
  }

  .car-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  .car-card {
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .car-card .car-image {
    width: 100%;
    height: 170px;
    object-fit: cover;
    background: #ddd;
    display: block;
  }

  .car-card .car-image.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #999;
    font-size: 0.85rem;
  }

  .car-card .car-body {
    padding: 14px 16px 16px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .car-card h3 {
    margin: 0 0 6px 0;
    font-size: 1.1rem;
  }

  .badge {
    display: inline-block;
    background: #eee;
    color: #444;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 3px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
    width: fit-content;
  }

  .price {
    font-size: 1.4rem;
    font-weight: bold;
    color: #b4502c;
    margin: 4px 0 10px 0;
  }

  .upgrades {
    font-size: 0.85rem;
    color: #555;
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px dashed #ddd;
  }

  .upgrades strong {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #888;
    margin-bottom: 4px;
  }

  .upgrade-row { padding: 1px 0; }
  .upgrade-label { color: #888; }

  .contact {
    background: #eee;
    padding: 16px;
    border-radius: 6px;
    margin-top: 30px;
  }

  footer {
    text-align: center;
    color: #888;
    font-size: 0.8rem;
    margin-top: 40px;
    padding: 20px 0;
  }

  .empty-msg, .loading-msg {
    color: #777;
    font-style: italic;
    padding: 10px 0;
  }
</style>
</head>
<body>

<header>
  <h1>Paleto Repairs Used Cars</h1>
  <p>Blaine County's used car lot</p>
</header>

<h2>Cars For Sale</h2>
<div id="car-list" class="car-grid">
  <p class="loading-msg">Loading inventory...</p>
</div>

<h2>Contact</h2>
<div class="contact">
  <p><strong>Location:</strong> Paleto Bay, Blaine County</p>
  <p><strong>Hours:</strong> Daily, 9AM - 9PM</p>
  <p><strong>Contact:</strong> Message @PaletoRepairs in-game</p>
</div>

<footer>
  Paleto Repairs Used Cars — fictional dealership for roleplay purposes only.
</footer>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAqmvzexaHohfggxW03ImbBFiomA49f3y0",
    authDomain: "used-cars-rp.firebaseapp.com",
    databaseURL: "https://used-cars-rp-default-rtdb.firebaseio.com",
    projectId: "used-cars-rp",
    storageBucket: "used-cars-rp.firebasestorage.app",
    messagingSenderId: "84719558182",
    appId: "1:84719558182:web:a4f01302c0a42fcd0c90e7",
    measurementId: "G-Q6F83G131G"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const carsRef = ref(db, "cars");

  const listEl = document.getElementById("car-list");

  onValue(carsRef, (snapshot) => {
    const data = snapshot.val();

    if (!data) {
      listEl.innerHTML = '<p class="empty-msg">No cars on the lot right now. Check back soon.</p>';
      return;
    }

    listEl.innerHTML = Object.values(data).map(car => buildCardHtml(car)).join("");
  }, (error) => {
    listEl.innerHTML = '<p class="empty-msg">Could not load inventory. Check the Firebase config.</p>';
    console.error(error);
  });

  function buildCardHtml(car) {
    const imageHtml = car.image
      ? `<img class="car-image" src="${escapeHtml(car.image)}" alt="${escapeHtml(car.name || 'Car photo')}" onerror="this.outerHTML='<div class=&quot;car-image placeholder&quot;>No image</div>'">`
      : `<div class="car-image placeholder">No image</div>`;

    const upgradeFields = [
      ["Engine", car.engine],
      ["Transmission", car.transmission],
      ["Suspension", car.suspension],
      ["Turbo", car.turbo],
    ].filter(([, value]) => value);

    const upgradesHtml = upgradeFields.length
      ? `<div class="upgrades"><strong>Upgrades</strong>${upgradeFields.map(([label, value]) =>
          `<div class="upgrade-row"><span class="upgrade-label">${escapeHtml(label)}:</span> ${escapeHtml(value)}</div>`
        ).join("")}</div>`
      : "";

    return `
      <div class="car-card">
        ${imageHtml}
        <div class="car-body">
          <h3>${escapeHtml(car.name || "")}</h3>
          ${car.condition ? `<span class="badge">${escapeHtml(car.condition)}</span>` : ""}
          <div class="price">${escapeHtml(car.price || "")}</div>
          ${upgradesHtml}
        </div>
      </div>
    `;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // exposed for potential reuse
  window.buildCardHtml = buildCardHtml;
</script>

</body>
</html>
